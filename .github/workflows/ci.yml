name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Must be >=22.13 because pdfjs-dist@5.7+ requires that engine.
          # Bumping from 20 here also fixes the `npm ci` resolution of
          # optional native deps (@emnapi/*) that older npm couldn't handle.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Provide placeholder values so Vite can build without real secrets.
          # These are NOT real credentials.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key
          VITE_OPENAI_API_KEY: placeholder_openai_key
        run: npm run build
